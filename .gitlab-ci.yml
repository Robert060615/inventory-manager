stages:
  - install
  - lint
  - test

default:
  image: node:24

# Casha MongoDB-binären som mongodb-memory-server laddar ner.
# Nyckel på branch-namn så att olika branches delar cache.
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/mongodb-binaries/

install:
  stage: install
  script:
    # npm install används istället för npm ci eftersom package-lock.json
    # genereras på Windows och saknar Linux-specifika optionella beroenden
    # (bl.a. @emnapi/core, @emnapi/runtime som rollup/vitest drar in på Linux).
    # npm install respekterar lock-filen men kompletterar med plattformsberoenden.
    - npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 day

lint:
  stage: lint
  script:
    - npx eslint .
  needs:
    - job: install
      artifacts: true

test:
  stage: test
  # MONGOMS_DOWNLOAD_DIR matchar mongodbMemoryServer.downloadDir i package.json
  # och pekar på den cachade katalogen.
  variables:
    MONGOMS_DOWNLOAD_DIR: ".cache/mongodb-binaries"
  script:
    - npm test
  needs:
    - job: install
      artifacts: true
